<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shrinking Ecosystem — Land Use by Region</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f4f3ef;--bg3:#e8e7e2;
  --t1:#1a1a18;--t2:#5a5a56;--t3:#8a8a84;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --green:#1d7a52;--rust:#b85c38;
  --r:8px;--rl:12px;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SFMono-Regular','Menlo','Consolas',monospace;
  --serif:Georgia,'Times New Roman',serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--t1:#f0efe8;--t2:#a8a89e;--t3:#6a6a62;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22)}
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;padding:0 0 5rem}
.nav-outer{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 1.5rem}
.nav-inner{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;gap:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:10px 0}
.nav-inner::-webkit-scrollbar{display:none}
.nav-pill{white-space:nowrap;flex-shrink:0;font-size:12px;padding:6px 15px;border-radius:20px;border:0.5px solid transparent;background:transparent;color:var(--t3);cursor:pointer;font-family:var(--sans);transition:all .15s;letter-spacing:.01em}
.nav-pill:hover{color:var(--t2);background:var(--bg2)}
.nav-pill.on{border-color:var(--green);color:var(--green);background:rgba(29,122,82,.09);font-weight:500}
.wrap{max-width:900px;margin:0 auto;padding:2rem 1.5rem 0}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);font-family:var(--mono);margin-bottom:8px}
h1{font-size:26px;font-weight:500;color:var(--t1);margin-bottom:6px;font-family:var(--serif);line-height:1.2}
.sub{font-size:14px;color:var(--t2);line-height:1.7;max-width:680px;margin-bottom:1.25rem}
.callout{background:var(--bg2);border-left:3px solid var(--rust);border-radius:0 var(--r) var(--r) 0;padding:11px 15px;margin-bottom:1.5rem;max-width:680px}
.callout p{font-size:13px;color:var(--t2);line-height:1.65}
.callout strong{font-weight:500;color:var(--t1)}
.stat-row{display:flex;margin-bottom:1.5rem;border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.stat-cell{flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:3px}
.stat-cell+.stat-cell{border-left:0.5px solid var(--border)}
.stat-num{font-size:40px;font-weight:500;font-family:var(--mono);line-height:1;transition:all .4s}
.eco{color:var(--green)}.human{color:var(--rust)}
.stat-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:1px}
.bar-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);font-family:var(--mono);margin-bottom:7px}
.land-bar{width:100%;height:72px;display:flex;border-radius:6px;overflow:hidden}
.seg{height:100%;transition:width .8s cubic-bezier(.4,0,.2,1),filter .12s;flex-shrink:0;cursor:pointer}
.seg:hover,.seg.hi{filter:brightness(1.2)}
.info-zone{min-height:70px;padding:12px 0 8px;margin-bottom:4px;border-bottom:0.5px solid var(--border)}
.info-name{font-size:14px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:8px;margin-bottom:3px}
.info-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.info-stat{font-size:12px;color:var(--t2);font-family:var(--mono);margin-bottom:5px}
.info-desc{font-size:13px;color:var(--t2);line-height:1.6;max-width:700px}
.info-hint{font-size:13px;color:var(--t3);font-style:italic;padding-top:6px}
.yr-row{display:flex;align-items:center;gap:14px;margin:1.25rem 0 4px}
.yr-big{font-size:38px;font-weight:500;color:var(--t1);font-family:var(--serif);min-width:90px}
input[type=range]{width:100%;accent-color:var(--green);cursor:pointer}
.tick-row{display:flex;justify-content:space-between;padding:0 2px;margin-bottom:12px}
.tick{font-size:11px;color:var(--t3);cursor:pointer;font-family:var(--mono)}
.tick:hover{color:var(--t1)}
.q-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.75rem}
.qbtn{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.qbtn:hover{background:var(--bg2);color:var(--t1)}
.qbtn.on{border-color:var(--green);color:var(--green);background:rgba(29,122,82,.09)}
.grid-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);font-family:var(--mono);margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:1.75rem}
.cat-card{background:var(--bg2);border-radius:var(--r);padding:12px;cursor:pointer;border:0.5px solid var(--border);border-left-width:3px;transition:border-color .15s}
.cat-card:hover{border-color:var(--border2)}
.cat-n{font-size:12px;font-weight:500;color:var(--t1);line-height:1.35;margin-bottom:7px}
.cat-p{font-size:22px;font-weight:500;font-family:var(--mono);color:var(--t1);line-height:1;margin-bottom:2px;transition:all .4s}
.cat-a{font-size:11px;color:var(--t2);font-family:var(--mono)}
.cat-x{font-size:12px;color:var(--t2);line-height:1.6;display:none;margin-top:9px;padding-top:9px;border-top:0.5px solid var(--border)}
.cat-card.open .cat-x{display:block}
.loss-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;border:0.5px solid var(--border);margin-top:7px}
.loss-fill{height:100%;background:var(--green);border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.note{font-size:11px;color:var(--t3);line-height:1.75;border-top:0.5px solid var(--border);padding-top:1.25rem;margin-bottom:1.5rem}
footer{font-size:12px;color:var(--t3)}
</style>
</head>
<body>

<div class="nav-outer">
  <div class="nav-inner" id="nav-inner"></div>
</div>

<div class="wrap">
  <div class="eyebrow" id="eyebrow"></div>
  <h1 id="main-title"></h1>
  <p class="sub" id="sub"></p>
  <div class="callout" id="callout"><p id="callout-text"></p></div>

  <div class="stat-row">
    <div class="stat-cell">
      <div class="stat-lbl">Functional ecosystem</div>
      <div class="stat-num eco" id="eco-n">—</div>
      <div class="stat-sub" id="eco-a">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Human-dominated land</div>
      <div class="stat-num human" id="hum-n">—</div>
      <div class="stat-sub" id="hum-a">—</div>
    </div>
    <div class="stat-cell" style="flex:2">
      <div class="stat-lbl">Ecosystem remaining</div>
      <div class="loss-track"><div class="loss-fill" id="loss-fill" style="width:0%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:10px;color:var(--t3);font-family:var(--mono)">0%</span>
        <span style="font-size:10px;color:var(--t3);font-family:var(--mono)">100%</span>
      </div>
    </div>
  </div>

  <div class="bar-lbl" id="bar-lbl"></div>
  <div class="land-bar" id="land-bar"></div>
  <div class="info-zone" id="info-zone"><div class="info-hint">Hover any color segment to explore a category</div></div>

  <div class="yr-row">
    <div class="yr-big" id="yr-disp">1800</div>
    <div style="flex:1"><input type="range" id="yr-sl" min="1800" max="2023" value="1800" step="1"></div>
  </div>
  <div class="tick-row">
    <span class="tick" onclick="setYr(1800)">1800</span>
    <span class="tick" onclick="setYr(1850)">1850</span>
    <span class="tick" onclick="setYr(1900)">1900</span>
    <span class="tick" onclick="setYr(1950)">1950</span>
    <span class="tick" onclick="setYr(2000)">2000</span>
    <span class="tick" onclick="setYr(2023)">2023</span>
  </div>
  <div class="q-row" id="q-row"></div>

  <div class="grid-lbl">Breakdown by category — click any card to expand</div>
  <div class="cat-grid" id="cat-grid"></div>

  <div class="note" id="note"></div>
  <footer>Created with Claude &mdash; summersgardening.com</footer>
</div>

  {id:'wetlands',      label:'Wetlands & peatlands',        color:'#45b08c',

const ECO_IDS=['intact_forest','native_grass','wetlands','other_nat'];
const KYS=[1800,1850,1900,1950,2000,2023];
let CV=VIEWS[0];

function norm(d){
  const t=Object.values(d).reduce((s,v)=>s+v,0);
  const r={};for(const[k,v]of Object.entries(d))r[k]=(v/t)*100;return r;
}
function interp(yr,kf){
  if(yr<=KYS[0])return norm(kf[KYS[0]]);
  if(yr>=KYS[KYS.length-1])return norm(kf[KYS[KYS.length-1]]);
  let lo=KYS[0],hi=KYS[KYS.length-1];
  for(let i=0;i<KYS.length-1;i++){if(KYS[i]<=yr&&yr<=KYS[i+1]){lo=KYS[i];hi=KYS[i+1];break;}}
  const t=(yr-lo)/(hi-lo);
  const ld=norm(kf[lo]),hd=norm(kf[hi]);
  const r={};for(const c of CATS)r[c.id]=ld[c.id]*(1-t)+hd[c.id]*t;return r;
}
function fmtAcres(pct,view){
  const v=pct/100*view.total;
  return view.unit==='B'?(v.toFixed(2)+'B acres'):(Math.round(v*1000)+'M acres');
}

// Build nav
const navEl=document.getElementById('nav-inner');
VIEWS.forEach(v=>{
  const b=document.createElement('button');
  b.className='nav-pill'+(v.id===CV.id?' on':'');
  b.textContent=v.name;b.dataset.id=v.id;
  b.addEventListener('click',()=>setView(v.id));
  navEl.appendChild(b);
});

// Build segments
const barEl=document.getElementById('land-bar');
const segs={};
CATS.forEach(c=>{
  const d=document.createElement('div');d.className='seg';d.style.background=c.color;
  barEl.appendChild(d);segs[c.id]=d;
});

// Build cat cards
const gridEl=document.getElementById('cat-grid');
const pEls={},aEls={};
CATS.forEach(c=>{
  const card=document.createElement('div');card.className='cat-card';card.style.borderLeftColor=c.color;
  card.innerHTML=`<div class="cat-n">${c.label}</div><div class="cat-p" id="p_${c.id}">—</div><div class="cat-a" id="a_${c.id}">—</div><div class="cat-x">${c.desc}</div>`;
  card.addEventListener('click',()=>card.classList.toggle('open'));
  gridEl.appendChild(card);
  pEls[c.id]=document.getElementById('p_'+c.id);
  aEls[c.id]=document.getElementById('a_'+c.id);
});

// Info zone
const infoZone=document.getElementById('info-zone');
function showInfo(c,pct){
  infoZone.innerHTML=`<div class="info-name"><div class="info-dot" style="background:${c.color}"></div>${c.label}</div><div class="info-stat">${pct.toFixed(1)}% of land &mdash; ${fmtAcres(pct,CV)}</div><div class="info-desc">${c.desc}</div>`;
}
function clearInfo(){infoZone.innerHTML='<div class="info-hint">Hover any color segment to explore a category</div>';}
CATS.forEach(c=>{
  segs[c.id].addEventListener('mouseenter',()=>{
    const pct=parseFloat(segs[c.id].style.width);
    showInfo(c,pct);
    document.querySelectorAll('.seg').forEach(s=>s.classList.remove('hi'));
    segs[c.id].classList.add('hi');
  });
  segs[c.id].addEventListener('mouseleave',()=>{clearInfo();segs[c.id].classList.remove('hi');});
});

const sl=document.getElementById('yr-sl');
const yd=document.getElementById('yr-disp');

function update(yr){
  const data=interp(yr,CV.kf);
  yd.textContent=Math.round(yr);
  const ecoPct=ECO_IDS.reduce((s,id)=>s+data[id],0);
  const humPct=100-ecoPct;
  document.getElementById('eco-n').textContent=Math.round(ecoPct)+'%';
  document.getElementById('eco-a').textContent='~'+fmtAcres(ecoPct,CV);
  document.getElementById('hum-n').textContent=Math.round(humPct)+'%';
  document.getElementById('hum-a').textContent='~'+fmtAcres(humPct,CV);
  document.getElementById('loss-fill').style.width=ecoPct+'%';
  CATS.forEach(c=>{
    const pct=data[c.id];
    segs[c.id].style.width=pct+'%';
    pEls[c.id].textContent=pct.toFixed(1)+'%';
    aEls[c.id].textContent=fmtAcres(pct,CV);
  });
}

function setYr(yr){
  sl.value=yr;update(yr);
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.yr)===yr));
}

function buildQuickButtons(view){
  const qr=document.getElementById('q-row');qr.innerHTML='';
  view.moments.forEach(m=>{
    const b=document.createElement('button');b.className='qbtn';b.textContent=m.lbl;b.dataset.yr=m.yr;
    b.addEventListener('click',()=>setYr(m.yr));qr.appendChild(b);
  });
}

function setView(vid){
  CV=VIEWS.find(v=>v.id===vid);
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.toggle('on',p.dataset.id===vid));
  document.getElementById('eyebrow').textContent=CV.eyebrow;
  document.getElementById('main-title').textContent=CV.title;
  document.getElementById('sub').textContent=CV.sub;
  document.getElementById('callout-text').innerHTML=CV.callout;
  document.getElementById('bar-lbl').textContent=CV.barLbl;
  document.getElementById('note').textContent=CV.note;
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('open'));
  clearInfo();
  buildQuickButtons(CV);
  setYr(1800);
  document.querySelectorAll('.qbtn')[0]?.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

sl.addEventListener('input',e=>{
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('on'));
  update(parseInt(e.target.value));
});

setView('global');
</script>
